# Local MCP Services - Docker Compose (Sandbox)
# Security-focused configuration with comprehensive hardening
# v7.1 - 仅本地访问加固版本
# 沙箱版本：使用不同端口避免与主环境冲突

services:
  # SearXNG Search Service
  searxng:
    build:
      context: .
      dockerfile: Dockerfile.search
    container_name: searxng-sandbox
    ports:
      - "127.0.0.1:28880:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:28880
      - SEARXNG_SECRET=${SEARXNG_SECRET:-changeme}
    volumes:
      - searxng-config:/etc/searxng
    # Security hardening
    security_opt:
      - no-new-privileges:true
      - apparmor:restricted
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:size=10m,mode=1777
    # Note: user removed - running as root is OK with no-new-privileges
    mem_limit: 512m
    cpus: 0.5
    pids_limit: 100
    networks:
      - mcp-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        reservations:
          memory: 256m
          cpus: '0.25'
    ulimits:
      nofile:
        soft: 1024
        hard: 2048

  # EasyOCR Service
  easyocr:
    build:
      context: .
      dockerfile: Dockerfile.ocr
    container_name: easyocr-sandbox
    ports:
      - "127.0.0.1:28881:8000"
    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=100m,mode=1777
    # user: removed for compatibility
    mem_limit: 4g
    cpus: 2.0
    pids_limit: 200
    networks:
      - mcp-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        reservations:
          memory: 2g
          cpus: '1.0'

  # Playwright MCP Service
  playwright:
    build:
      context: .
      dockerfile: Dockerfile.playwright
    container_name: playwright-sandbox
    ports:
      - "127.0.0.1:28882:3100"
    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SYS_ADMIN
    read_only: true
    tmpfs:
      - /tmp:size=50m,mode=1777
    # user: removed for compatibility
    mem_limit: 2g
    cpus: 1.0
    pids_limit: 150
    networks:
      - mcp-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        reservations:
          memory: 1g
          cpus: '0.5'

  # Firecrawl Service
  firecrawl:
    build:
      context: .
      dockerfile: Dockerfile.firecrawl
    container_name: firecrawl-sandbox
    ports:
      - "127.0.0.1:28883:8002"
    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:size=50m,mode=1777
    # user: removed for compatibility
    mem_limit: 1g
    cpus: 0.5
    pids_limit: 100
    networks:
      - mcp-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        reservations:
          memory: 512m
          cpus: '0.25'

# Networks - isolated bridge network
networks:
  mcp-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
    driver_opts:
      com.docker.network.bridge.enable_icc: "false"

# Volumes
volumes:
  searxng-config:
    driver: local
